    The Indigo NYE Gala is the flagship event of the year. Guests enjoy a seven-course dinner, live orchestra performance, champagne countdown, and a 12-minute bespoke fireworks display.`,
    highlights: [
      { icon: "restaurant", title: "7-Course Dinner", desc: "Michelin-star chef curated menu" },
      { icon: "music_note", title: "Live Orchestra", desc: "Full 40-piece ensemble performance" },
      { icon: "celebration", title: "Midnight Fireworks", desc: "12-minute bespoke display" },
      { icon: "wine_bar", title: "Champagne Toast", desc: "Vintage Moët & Chandon countdown" }
    ],
    speakers: [
      { name: "Chef Arjun Mehta", role: "Executive Chef", org: "SALT Restaurant" },
      { name: "Orchestra Horizon", role: "Live Ensemble", org: "Philharmonic" },
      { name: "Layla Al Rashid", role: "Event Host", org: "Indigo Horizon" }
    ],
    tags: ["Gala", "NYE", "Kolkata", "Black-tie"],
    organizer: "Indigo Horizon Events", orgRole: "Flagship Gala Productions"
  }
};

// ── Toast ──────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(message, type) {
  const toast = document.getElementById("toast");
  const icons = { success: "check_circle", error: "error" };
  document.getElementById("toastMsg").textContent  = message;
  document.getElementById("toastIcon").textContent = icons[type] || "check_circle";
  toast.className = "show " + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toast.className = type; }, 3500);
}

const user = localStorage.getItem("ih_user");
// ── Registration ───────────────────────────────────────────────────────────────
function registerNow() {
  const id = new URLSearchParams(window.location.search).get("id") || "featured";
  const ev = EVENTS[id];
  if (!ev) return;

  // Already registered?
  if (localStorage.getItem("ih_reg_" + user + "_" + id)) {
    showToast("You have already registered for this event.", "error");
    return;
  }

  // Sold out?
  if (ev.filled >= ev.capacity) {
    showToast("Sorry, this event is sold out.", "error");
    return;
  }

  // Decrement seat
  const key = "ih_filled_" + id;

  // get existing filled value OR default
  let filled = localStorage.getItem(key);
filled = filled ? parseInt(filled) : ev.filled;

// increment
filled += 1;

// store updated value
localStorage.setItem(key, filled);

// update object
ev.filled = filled;

// mark registered
localStorage.setItem("ih_reg_" + user + "_" + id, "true");

  // Live-update sidebar
  const pct       = Math.round((ev.filled / ev.capacity) * 100);
  const remaining = ev.capacity - ev.filled;

  const bar = document.getElementById("capacityBar");
  if (bar) bar.style.width = pct + "%";

  const pctEl = document.getElementById("capacityPct");
  if (pctEl) pctEl.textContent = pct + "% Filled";

  const remEl = document.getElementById("remainingCount");
  if (remEl) {
    remEl.textContent = remaining === 0 ? "Sold Out" : remaining;
    remEl.className   = "text-xl font-black " + (remaining === 0 ? "text-[#ff6e84]" : "text-secondary");
  }

  // Disable button
  const btn = document.getElementById("registerBtn");
  if (btn) {
    btn.textContent   = "Registered ✓";
    btn.disabled      = true;
    btn.style.opacity = "0.65";
    btn.style.cursor  = "not-allowed";
  }

  showToast("Successfully Registered! See you there 🎉", "success");
}

    </section>

    <section class="grid grid-cols-1 lg:grid-cols-12 gap-12 pb-24">
      <div class="lg:col-span-8 space-y-12">
        <div class="space-y-6">
          <h2 class="text-2xl font-bold tracking-tight border-b border-outline-variant/10 pb-4">About the Event</h2>
          <div class="space-y-4 text-on-surface-variant leading-relaxed">
            ${ev.description.split('\n\n').map(p => `<p>${p.trim()}</p>`).join('')}
          </div>
        </div>
        <div class="space-y-6">
          <h2 class="text-2xl font-bold tracking-tight">Event Highlights</h2>
          <ul class="grid grid-cols-1 md:grid-cols-2 gap-4">
            ${ev.highlights.map(h => `
            <li class="flex items-start gap-3 p-4 bg-surface-container-low rounded-lg">
              <span class="material-symbols-outlined text-secondary">${h.icon}</span>
              <div><p class="font-bold text-on-surface">${h.title}</p><p class="text-sm text-on-surface-variant">${h.desc}</p></div>
            </li>`).join('')}
          </ul>
        </div>
        <div class="space-y-6">
          <h2 class="text-2xl font-bold tracking-tight">Keynote Speakers</h2>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            ${ev.speakers.map(s => `
            <div class="bg-surface-container-high rounded-xl p-6">
              <div class="w-12 h-12 rounded-full bg-primary-container/40 flex items-center justify-center mb-4">

              </div>
              <p class="text-xs text-primary font-bold uppercase tracking-widest mb-1">${s.role}</p>

      <div class="lg:col-span-4 space-y-8">

            <div>

        <div class="bg-surface-container-highest p-8 rounded-xl">

          <div class="space-y-6">
            <div>
              <div class="flex justify-between text-sm mb-2">
                <span class="text-on-surface-variant">Registration Progress</span>
                <span id="capacityPct" class="text-primary font-bold">${pct}% Filled</span>
              </div>
              <div class="h-2 w-full bg-surface-container-low rounded-full overflow-hidden">
                <div id="capacityBar" class="h-full bg-gradient-to-r from-primary to-secondary rounded-full transition-all duration-500" style="width:${pct}%"></div>
              </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div class="bg-surface/50 p-4 rounded-lg">
                <p class="text-[10px] uppercase font-bold text-on-surface-variant">Total Seats</p>
                <p class="text-xl font-black">${ev.capacity.toLocaleString()}</p>
              </div>
              <div class="bg-surface/50 p-4 rounded-lg">
                <p class="text-[10px] uppercase font-bold text-on-surface-variant">Remaining</p>
                <p id="remainingCount" class="text-xl font-black ${remaining === 0 ? 'text-[#ff6e84]' : 'text-secondary'}">${remaining === 0 ? 'Sold Out' : remaining}</p>
              </div>
            </div>
          </div>
        </div>

        <div class="p-4">
          <h3 class="text-xs font-black uppercase tracking-[0.2em] text-on-surface-variant mb-4">Tags</h3>
          <div class="flex flex-wrap gap-2">
            ${ev.tags.map(t => `<span class="px-3 py-1 bg-surface-container-high rounded-full text-xs font-medium text-on-surface-variant hover:text-primary cursor-default transition-colors">${t}</span>`).join('')}

        </div>
      </div>
    </section>
  `;
}

render();
</script>
